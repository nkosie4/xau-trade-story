  const allAnswered=issues.length===0||issues.every((_,i)=>answers[i]&&answers[i].trim().length>2);
  return(
    <div style={{position:"fixed",inset:0,background:"#000d",zIndex:300,display:"flex",flexDirection:"column",padding:12,overflowY:"auto"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,maxWidth:540,width:"100%",margin:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div><div style={{fontFamily:C.mono,fontSize:11,fontWeight:700,color:C.gold,letterSpacing:1.5,marginBottom:3}}>TRADE REPLAY</div><div style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{entry.date} · {entry.session} · {entry.score||"?"}%</div></div>
          <Tag l={(entry.outcome||"").toUpperCase()} c={oc}/>
        </div>
        {entry.narrative&&<div style={{background:C.surf,borderRadius:8,padding:"10px 12px",marginBottom:12}}><div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginBottom:5,letterSpacing:1}}>WHAT YOU TOLD YOURSELF</div><div style={{fontFamily:C.sans,fontSize:11,color:C.mid,lineHeight:1.6,fontStyle:"italic"}}>"{entry.narrative}"</div></div>}
        {issues.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontFamily:C.mono,fontSize:8,color:C.red,letterSpacing:1.5,marginBottom:8}}>GAPS & CONFLICTS — WHY DID YOU TRADE ANYWAY?</div>
            {issues.map((issue,i)=>(
              <div key={i} style={{background:"#1a0a0a",border:`1px solid ${C.red}25`,borderLeft:`3px solid ${issue.type==="conflict"?C.red:C.orange}`,borderRadius:7,padding:"10px 12px",marginBottom:8}}>
                <div style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:6}}>
                  <span style={{fontFamily:C.mono,fontSize:8,color:issue.type==="conflict"?C.red:C.orange,background:(issue.type==="conflict"?C.red:C.orange)+"20",padding:"1px 6px",borderRadius:3,flexShrink:0}}>{issue.rule.cat}</span>
                  <span style={{fontFamily:C.mono,fontSize:9,color:"#fca5a5",lineHeight:1.4}}>{issue.text}</span>
                </div>
                <div style={{background:C.green+"0a",border:`1px solid ${C.green}20`,borderRadius:5,padding:"7px 9px",marginBottom:8}}><div style={{fontFamily:C.mono,fontSize:8,color:C.green,marginBottom:3}}>WHAT SHOULD HAVE HAPPENED</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,lineHeight:1.4}}>{issue.rule.fix}</div></div>
                <textarea value={answers[i]||""} onChange={e=>setAnswers(p=>({...p,[i]:e.target.value}))} placeholder="Be honest. e.g. I rushed, I was chasing..." rows={2} style={{width:"100%",background:C.surf,border:`1px solid ${answers[i]?C.gold:C.border}`,borderRadius:5,color:C.mid,fontSize:10,padding:"6px 8px",fontFamily:C.mono,resize:"none",display:"block"}}/>
              </div>
            ))}
          </div>
        )}
        {issues.length===0&&<div style={{background:C.green+"12",border:`1px solid ${C.green}30`,borderRadius:8,padding:"12px",marginBottom:12,textAlign:"center"}}><div style={{fontFamily:C.mono,fontSize:10,color:C.green,fontWeight:700,marginBottom:4}}>✓ NO GAPS OR HIGH CONFLICTS</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid}}>If it was a loss, the process was right — review execution only.</div></div>}
        <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,letterSpacing:1,marginBottom:5}}>OVERALL LESSON</div>
        <textarea value={replayNote} onChange={e=>setReplayNote(e.target.value)} placeholder="What is the one thing you will do differently next time?" rows={2} style={{width:"100%",background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,color:C.mid,fontSize:11,padding:"7px 9px",fontFamily:C.mono,resize:"none",marginBottom:12,display:"block"}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onSave({replayAnswers:answers,replayNote,replayDone:true})} disabled={!allAnswered} style={{flex:2,padding:"11px",background:allAnswered?C.gold+"20":C.surf,border:`1px solid ${allAnswered?C.gold:C.border}`,borderRadius:7,color:allAnswered?C.gold:C.dim,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:allAnswered?"pointer":"default"}}>SAVE REPLAY</button>
          <button onClick={onClose} style={{flex:1,padding:"11px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,color:C.mid,fontFamily:C.mono,fontSize:9,cursor:"pointer"}}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("gate");
  const[form,setForm]=useState(initForm());
  const[sast,setSast]=useState(getSAST());
  const[journal,setJournal]=useState(loadJ);
  const[settings,setSettings]=useState(loadS);
  const[logMode,setLogMode]=useState(false);
  const[pGrade,setPGrade]=useState(null);
  const[pNote,setPNote]=useState("");
  const[pChart,setPChart]=useState("");
  const[filter,setFilter]=useState("all");
  const[exportEntry,setExportEntry]=useState(null);
  const[reviewE,setReviewE]=useState(null);
  const[replayE,setReplayE]=useState(null);
  const[showSet,setShowSet]=useState(false);
  const[showWeekly,setShowWeekly]=useState(false);
  const[sessionOpen,setSessionOpen]=useState(false);
  const[gateAnswers,setGateAnswers]=useState({news:null,emotion:null});
  const[gatePassed,setGatePassed]=useState(false);
  const[weeklyData,setWeeklyData]=useState(loadW);
  const[biasNotes,setBiasNotes]=useState(loadB);
  const[todayBiasNote,setTodayBiasNote]=useState(()=>{const n=loadB();const s=getSAST();return n[s.todayKey]||"";});

  useEffect(()=>{const t=setInterval(()=>setSast(getSAST()),30000);return()=>clearInterval(t);},[]);

  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  const togLQ=t=>upd("lqTypes",form.lqTypes.includes(t)?form.lqTypes.filter(x=>x!==t):[...form.lqTypes,t]);
  const saveBiasNote=note=>{setTodayBiasNote(note);const u={...biasNotes,[sast.todayKey]:note};setBiasNotes(u);saveB(u);};
  const saveWeeklyData=data=>{const u={...weeklyData,[sast.weekKey]:data};setWeeklyData(u);saveW(u);};

  const score=weightedScore(form,sast.isNY);
  const narrative=buildNarrative(form,score);
  const stats=calcStats(journal,sast.todayKey,sast.weekKey,settings.maxLoss,settings.maxTrades);
  const cond=CONDS.find(o=>o.v===form.condType);
  const sc=stats.locked?C.red:score.sideways?C.red:score.validity==="VALID"?C.green:score.validity==="LOW CONFIDENCE"?C.yellow:C.dim;
  const sl=stats.locked?"LOCKED":score.sideways?"STAND ASIDE":score.validity==="VALID"?"TRADE READY":score.validity==="LOW CONFIDENCE"?"LOW CONF":"BUILDING...";
  const streakCol=stats.streakType==="win"?C.green:C.red;
  const streakWarn=stats.streakType==="loss"&&stats.streak>=3;

  const saveEntry=()=>{
    const e={id:Date.now(),date:sast.dateStr,time:sast.timeStr,session:sast.session,todayKey:sast.todayKey,weekKey:sast.weekKey,narrative,score:score.pct,validity:score.validity,keyConflicts:score.keyConflicts,gaps:score.gaps,conflicts:score.conflicts,outcome:"pending",grade:pGrade,tradeNote:pNote,chartUrl:pChart,dailyBiasNote:todayBiasNote||"",condition:form.condType,fibLevel:form.fibLevel,lqTypes:form.lqTypes,direction:form.lqDir,risk:form.risk,entryModel:form.entryModel,followedProcess:null,reviewNote:"",replayDone:false,entryPrice:"",exitPrice:"",exitDate:"",exitTime:"",netProfit:null};
    const u=[e,...journal];setJournal(u);saveJ(u);
    setLogMode(false);setPGrade(null);setPNote("");setPChart("");
    setForm(initForm());setGatePassed(false);setGateAnswers({news:null,emotion:null});setTab("gate");
  };
  const updateEntry=(id,patch)=>{const u=journal.map(e=>e.id===id?{...e,...patch}:e);setJournal(u);saveJ(u);};
  const delEntry=id=>{const u=journal.filter(e=>e.id!==id);setJournal(u);saveJ(u);};
  const filtered=filter==="all"?journal:journal.filter(e=>e.outcome===filter);
  const gateBlocked=gateAnswers.news===true||gateAnswers.emotion===true||stats.locked;
  const gateComplete=gateAnswers.news===false&&gateAnswers.emotion===false&&!stats.locked;
  const TABS=[{v:"gate",l:"GATE"},{v:"analysis",l:"ANALYSIS"},{v:"story",l:"STORY"},{v:"stats",l:"STATS"},{v:"journal",l:`LOG(${journal.length})`}];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:C.sans}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;}button{transition:all .12s;border:none;background:none;}button:active{transform:scale(.96);}textarea,input{outline:none;font-family:inherit;}textarea:focus,input:focus{border-color:${C.gold}!important;}::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px;}`}</style>

      {showSet&&<SettingsModal settings={settings} onSave={s=>{setSettings(s);saveS(s);}} onClose={()=>setShowSet(false)}/>}
      {showWeekly&&<WeeklyModal current={weeklyData[sast.weekKey]||{}} weekKey={sast.weekKey} onSave={saveWeeklyData} onClose={()=>setShowWeekly(false)}/>}
      {reviewE&&<ReviewModal entry={reviewE} onSave={patch=>{updateEntry(reviewE.id,patch);setReviewE(null);}} onClose={()=>setReviewE(null)}/>}
      {replayE&&<ReplayModal entry={replayE} onSave={patch=>{updateEntry(replayE.id,patch);setReplayE(null);}} onClose={()=>setReplayE(null)}/>}

      {/* HEADER */}
      <div style={{position:"sticky",top:0,zIndex:100,background:C.surf+"f5",backdropFilter:"blur(14px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{background:sast.isNY?C.green+"10":"transparent",borderBottom:`1px solid ${C.border}`,padding:"5px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:sast.sc,boxShadow:`0 0 6px ${sast.sc}`}}/>
            <span style={{fontFamily:C.mono,fontSize:9,color:sast.sc,fontWeight:700,letterSpacing:1}}>{sast.session}</span>
            <span style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{sast.timeStr} SAST</span>
            {sast.isNY&&<Tag l="NY SESSION ✓" c={C.green}/>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{sast.dateStr}</span>
            <button onClick={()=>setShowSet(true)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.dim,padding:"2px 8px",fontFamily:C.mono,fontSize:10,cursor:"pointer"}}>⚙</button>
          </div>
        </div>
        {!sast.isNY&&(
          <div style={{padding:"5px 14px",background:"#ff4d6a20",borderBottom:"1px solid #ff4d6a40"}}>
            <span style={{fontFamily:C.mono,fontSize:9,color:"#ff4d6a",fontWeight:700}}>⛔ NY SESSION ONLY — Trading blocked</span>
          </div>
        )}
        {sast.alert&&<div style={{padding:"4px 14px",background:sast.alert.col+"18",borderBottom:`1px solid ${sast.alert.col}30`}}><span style={{fontFamily:C.mono,fontSize:9,color:sast.alert.col}}>{sast.alert.msg}</span></div>}
        {stats.locked&&<div style={{padding:"5px 14px",background:C.red+"20",borderBottom:`1px solid ${C.red}40`}}><span style={{fontFamily:C.mono,fontSize:9,color:C.red,fontWeight:700}}>⛔ {stats.lockReason} — Done for today.</span></div>}
        {streakWarn&&<div style={{padding:"4px 14px",background:C.red+"12",borderBottom:`1px solid ${C.red}20`}}><span style={{fontFamily:C.mono,fontSize:9,color:C.red}}>⚠ {stats.streak} LOSS STREAK — Reduce size or step back.</span></div>}
        {/* Bias note + weekly */}
        <div style={{padding:"5px 14px",background:C.surf,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <input value={todayBiasNote} onChange={e=>saveBiasNote(e.target.value)} placeholder="Today's bias note — e.g. DXY weak, gold pushing highs..." style={{flex:1,background:"transparent",border:"none",color:C.mid,fontSize:10,fontFamily:C.mono,minWidth:0}}/>
          <button onClick={()=>setShowWeekly(true)} style={{background:weeklyData[sast.weekKey]?.saved?C.gold+"20":"transparent",border:`1px solid ${weeklyData[sast.weekKey]?.saved?C.gold:C.border}`,borderRadius:4,color:weeklyData[sast.weekKey]?.saved?C.gold:C.dim,padding:"2px 8px",fontFamily:C.mono,fontSize:8,cursor:"pointer",flexShrink:0}}>{weeklyData[sast.weekKey]?.saved?"📋 WEEKLY":"+ WEEKLY"}</button>
        </div>
        {weeklyData[sast.weekKey]?.saved&&(
          <div style={{padding:"3px 14px",background:C.gold+"08",borderBottom:`1px solid ${C.gold}15`,display:"flex",gap:10,overflowX:"auto"}}>
            {[weeklyData[sast.weekKey].focus1,weeklyData[sast.weekKey].focus2,weeklyData[sast.weekKey].focus3].filter(Boolean).map((f,i)=>(
              <span key={i} style={{fontFamily:C.mono,fontSize:8,color:C.gold,whiteSpace:"nowrap"}}>· {f}</span>
            ))}
          </div>
        )}
        {/* Title + score */}
        <div style={{padding:"8px 14px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontFamily:C.mono,fontSize:17,fontWeight:700,color:C.gold}}>XAU/USD</span>
            <span style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:2}}>TRADE STORY</span>
            {score.pct>0&&<Tag l={`${score.pct}% · ${score.validity}`} c={score.validityCol}/>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {stats.streakType&&<><div style={{textAlign:"right"}}><div style={{fontFamily:C.mono,fontSize:14,fontWeight:700,color:streakCol,lineHeight:1}}>{stats.streak}<span style={{fontSize:8}}>✕</span></div><div style={{fontFamily:C.mono,fontSize:7,color:streakCol,letterSpacing:1}}>{stats.streakType==="win"?"WIN":"LOSS"}</div></div><div style={{background:C.border,width:1,height:24}}/></>}
            <div style={{textAlign:"right"}}><div style={{fontFamily:C.mono,fontSize:16,fontWeight:700,color:sc,lineHeight:1}}>{score.pct}<span style={{fontSize:8}}>%</span></div><div style={{fontFamily:C.mono,fontSize:7,color:sc,letterSpacing:1}}>{sl}</div></div>
          </div>
        </div>
        <div style={{margin:"6px 14px 0",height:2,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${score.pct}%`,background:sc,borderRadius:2,transition:"width .4s"}}/></div>
        <div style={{display:"flex",padding:"6px 14px 0"}}>
          {TABS.map(t=><button key={t.v} onClick={()=>setTab(t.v)} style={{flex:1,padding:"6px 2px",borderBottom:`2px solid ${tab===t.v?C.gold:"transparent"}`,color:tab===t.v?C.gold:C.dim,fontFamily:C.mono,fontSize:8,fontWeight:700,letterSpacing:1,cursor:"pointer"}}>{t.l}</button>)}
        </div>
      </div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"12px 10px 80px"}}>

        {/* GATE */}
        {tab==="gate"&&(
          <div>
            <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:12,marginTop:4}}>PRE-TRADE GATE — Answer before analysis unlocks</div>
            {[
              {key:"news",q:"Is there high-impact news in the next 30 minutes?",sub:"NFP · CPI · FOMC · Powell speech · Red folder event",yesMsg:"⛔ Do not trade into news. Close the chart and come back after the release settles."},
              {key:"emotion",q:"Are you trading out of emotion right now?",sub:"Revenge trading · Chasing · Anxious · Overconfident",yesMsg:"⛔ Step away. Emotional trading is how accounts blow. Come back when you're neutral."},
            ].map(({key,q,sub,yesMsg})=>(
              <Box key={key} ac={gateAnswers[key]===true?C.red:gateAnswers[key]===false?C.green:C.border} mb={8}>
                <div style={{padding:"14px"}}>
                  <div style={{fontFamily:C.sans,fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>{q}</div>
                  <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,marginBottom:12}}>{sub}</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setGateAnswers(p=>({...p,[key]:true}))} style={{flex:1,padding:"11px",background:gateAnswers[key]===true?C.red+"22":"transparent",border:`1px solid ${gateAnswers[key]===true?C.red:C.border}`,borderRadius:7,color:gateAnswers[key]===true?C.red:C.mid,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>YES</button>
                    <button onClick={()=>setGateAnswers(p=>({...p,[key]:false}))} style={{flex:1,padding:"11px",background:gateAnswers[key]===false?C.green+"22":"transparent",border:`1px solid ${gateAnswers[key]===false?C.green:C.border}`,borderRadius:7,color:gateAnswers[key]===false?C.green:C.mid,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>NO — All clear</button>
                  </div>
                  {gateAnswers[key]===true&&<div style={{background:C.red+"15",border:`1px solid ${C.red}30`,borderRadius:6,padding:"8px 10px",marginTop:10,fontFamily:C.mono,fontSize:9,color:C.red}}>{yesMsg}</div>}
                </div>
              </Box>
            ))}
            {!sast.isNY&&!stats.locked&&<Box ac={C.yellow} mb={8}><div style={{padding:"16px 20px",display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:22}}>🕐</div><div><div style={{fontFamily:C.mono,fontSize:10,fontWeight:700,color:C.yellow,letterSpacing:1,marginBottom:4}}>OUTSIDE NY SESSION</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,lineHeight:1.6}}>Current time: {sast.timeStr} SAST — {sast.session}.<br/>NY session is 14:00–21:00 SAST. You can analyse and prepare now, but logging a trade will be blocked until NY opens.</div></div></div></Box>}
            {stats.locked&&<Box ac={C.red} mb={8}><div style={{padding:"20px",textAlign:"center"}}><div style={{fontSize:28,marginBottom:8}}>⛔</div><div style={{fontFamily:C.mono,fontSize:11,fontWeight:700,color:C.red,letterSpacing:1.5,marginBottom:6}}>ACCOUNT LOCKED</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,lineHeight:1.6}}>{stats.lockReason}.<br/>Protect your capital. Come back tomorrow.</div></div></Box>}
            {!gateBlocked&&gateComplete&&<button onClick={()=>{setGatePassed(true);setTab("analysis");}} style={{width:"100%",padding:"16px",background:C.green+"18",border:`1px solid ${C.green}`,borderRadius:10,color:C.green,fontFamily:C.mono,fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",marginTop:4}}>✓ GATE PASSED — START ANALYSIS →</button>}
            {gateBlocked&&!stats.locked&&<div style={{background:C.red+"10",border:`1px solid ${C.red}30`,borderRadius:10,padding:"16px",textAlign:"center",marginTop:4}}><div style={{fontFamily:C.mono,fontSize:10,color:C.red,fontWeight:700}}>GATE BLOCKED — DO NOT TRADE</div></div>}
            {!gateComplete&&!gateBlocked&&<div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",textAlign:"center",marginTop:4}}><div style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>Answer both questions above to proceed.</div></div>}
          </div>
        )}

        {/* ANALYSIS */}
        {tab==="analysis"&&(
          !gatePassed?(
            <div style={{background:C.card,border:`1px solid ${C.yellow}40`,borderLeft:`3px solid ${C.yellow}`,borderRadius:10,padding:"30px 20px",textAlign:"center",marginTop:10}}>
              <div style={{fontSize:28,marginBottom:8}}>🔒</div>
              <div style={{fontFamily:C.mono,fontSize:11,fontWeight:700,color:C.yellow,letterSpacing:1.5,marginBottom:6}}>COMPLETE THE GATE FIRST</div>
              <button onClick={()=>setTab("gate")} style={{marginTop:14,padding:"10px 20px",background:C.gold+"20",border:`1px solid ${C.gold}`,borderRadius:7,color:C.gold,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>GO TO GATE →</button>
            </div>
          ):(<>
            {/* Session ref — collapsible */}
            <Box ac={C.blue}>
              <button onClick={()=>setSessionOpen(p=>!p)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"transparent",cursor:"pointer",textAlign:"left"}}>
                <span style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5}}>NY SESSION WINDOWS · SAST</span>
                <span style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{sessionOpen?"▲ hide":"▼ show"}</span>
              </button>
              {sessionOpen&&<div style={{padding:"0 14px 10px"}}>{[["1:00–2:00 PM","Pre-NY Dead Zone ✗",C.red],["2:00–2:30 PM","NY Open — wait 30min ⚠",C.orange],["2:30–4:30 PM","NY Active ★",C.green],["4:30–5:30 PM","London Close Overlap ↩",C.purple],["5:30–9:00 PM","NY Afternoon ★",C.green],["9:00 PM+","Session Closed ✗",C.red]].map(([t,l,c])=><div key={t} style={{display:"flex",gap:10,marginBottom:3}}><span style={{fontFamily:C.mono,fontSize:9,color:C.dim,minWidth:100}}>{t}</span><span style={{fontFamily:C.mono,fontSize:9,color:c}}>{l}</span></div>)}</div>}
            </Box>

            {/* 01 RANGES */}
            <Box ac={form.rangeDir==="bullish"?C.green:form.rangeDir==="bearish"?C.red:C.border}>
              <Head step="01" label="RANGES + HIERARCHY + MAs" tag="STRUCTURE" tc={C.purple} badge="0.9 + 0.8pt" bc={C.dim}/>
              <Lbl t="RANGE DIRECTION"/>
              <Tri opts={[["bullish","▲ BULLISH",C.green],["bearish","▼ BEARISH",C.red]]} val={form.rangeDir} set={v=>upd("rangeDir",v)}/>
              <Lbl t="HIGHEST CONFIRMED RANGE TYPE"/>
              <div style={{display:"flex",gap:6,padding:"0 14px 12px"}}>
                {[["external","External"],["internal","Internal"],["sub","Sub-structure"]].map(([v,l])=>(
                  <button key={v} onClick={()=>upd("rangeType",form.rangeType===v?"":v)} style={{flex:1,padding:"8px 4px",background:form.rangeType===v?C.purple+"25":"transparent",border:`1px solid ${form.rangeType===v?C.purple:C.border}`,borderRadius:6,color:form.rangeType===v?C.purple:C.mid,fontFamily:C.mono,fontSize:9,fontWeight:700,cursor:"pointer"}}>{l}</button>
                ))}
              </div>
              {/* Hierarchy */}
              <div style={{margin:"0 14px 12px",background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>RANGE HIERARCHY</div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  {[["externalDir","EXTERNAL"],["internalDir","INTERNAL / SUB"]].map(([key,lbl])=>(
                    <div key={key} style={{flex:1}}>
                      <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginBottom:5}}>{lbl}</div>
                      <div style={{display:"flex",gap:4}}>
                        {[["bullish","▲",C.green],["bearish","▼",C.red]].map(([v,l,c])=>(
                          <button key={v} onClick={()=>upd(key,form[key]===v?"":v)} style={{flex:1,padding:"6px",background:form[key]===v?c+"22":"transparent",border:`1px solid ${form[key]===v?c:C.border}`,borderRadius:5,color:form[key]===v?c:C.dim,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>{l}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                {form.externalDir&&form.internalDir&&(
                  form.externalDir===form.internalDir
                    ?<div style={{fontFamily:C.mono,fontSize:9,color:C.green}}>✓ Hierarchy aligned — full structure weight.</div>
                    :(score.isPullback
                        ?<div style={{fontFamily:C.mono,fontSize:9,color:C.green}}>✓ Pullback-in-trend — internal {form.internalDir} within external {form.externalDir} trend. Full weight, no conflict.</div>
                        :<div style={{fontFamily:C.mono,fontSize:9,color:C.yellow}}>⚡ Misaligned — internal {form.internalDir} vs external {form.externalDir}. Confirm your Market Condition selection matches (likely CMC).</div>
                      )
                )}
              </div>
              {/* MAs */}
              <Lbl t="MOVING AVERAGES (0.8pt — select each individually)"/>
              {(form.fibLevel==="618"||form.fibLevel==="786")&&(
                <div style={{margin:"0 14px 8px",background:C.dim+"15",border:`1px solid ${C.dim}40`,borderRadius:6,padding:"8px 10px"}}>
                  <span style={{fontFamily:C.mono,fontSize:9,color:C.mid}}>ⓘ Fib {form.fibLevel==="618"?"61.8%":"78.6%"} selected — MAs cross/tangle this deep and are excluded from scoring. Weight redistributed to other categories. Selections below are informational only.</span>
                </div>
              )}
              <div style={{padding:"0 14px 4px",opacity:(form.fibLevel==="618"||form.fibLevel==="786")?0.5:1}}>
                {[["ma50","MA 50"],["ma100","MA 100"],["ma200","MA 200"]].map(([key,label])=>(
                  <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontFamily:C.mono,fontSize:9,color:C.dim,minWidth:52}}>{label}</span>
                    <div style={{display:"flex",gap:5,flex:1}}>
                      {[["aligned","▲ ALIGNED",C.green],["conflict","▼ CONFLICT",C.red],["","— N/A",C.dim]].map(([v,l,c])=>(
                        <button key={v} onClick={()=>upd(key,form[key]===v?"":v)} style={{flex:1,padding:"5px 4px",background:form[key]===v&&v?c+"22":"transparent",border:`1px solid ${form[key]===v&&v?c:C.border}`,borderRadius:5,color:form[key]===v&&v?c:C.dim,fontFamily:C.mono,fontSize:8,fontWeight:form[key]===v&&v?700:400,cursor:"pointer"}}>{l}</button>
                      ))}
                    </div>
                  </div>
                ))}
                {(form.ma50||form.ma100||form.ma200)&&form.fibLevel!=="618"&&form.fibLevel!=="786"&&(()=>{
                  const aligned=[form.ma50,form.ma100,form.ma200].filter(v=>v==="aligned").length;
                  const set=[form.ma50,form.ma100,form.ma200].filter(v=>v&&v!=="").length;
                  if(set===0)return null;
                  const pts=aligned===3?0.8:aligned===2?0.53:aligned===1?0.27:0;
                  const col=aligned===3?C.green:aligned===2?C.yellow:aligned===1?C.orange:C.red;
                  return <div style={{display:"flex",justifyContent:"space-between",background:col+"12",border:`1px solid ${col}25`,borderRadius:5,padding:"5px 9px",marginTop:4}}><span style={{fontFamily:C.mono,fontSize:9,color:col}}>{aligned}/{set} MAs aligned</span><span style={{fontFamily:C.mono,fontSize:9,color:col,fontWeight:700}}>{pts.toFixed(2)} / 0.80pt</span></div>;
                })()}
              </div>
              
            </Box>

            {/* 03 CONDITIONS */}
            <Box ac={C.blue}>
              <Head step="02" label="MARKET CONDITIONS" tag="CONDITIONS" tc={C.blue} badge="0.7pt" bc={C.dim}/>
              <div style={{padding:"8px 14px 4px"}}>
                {CONDS.map(o=>{
                  const cd=stats.condStats[o.v];
                  const cWR=cd&&cd.t>0?Math.round(cd.w/cd.t*100):null;
                  return(
                    <button key={o.v} onClick={()=>upd("condType",form.condType===o.v?"":o.v)} style={{width:"100%",marginBottom:5,background:form.condType===o.v?o.col+"18":"transparent",border:`1px solid ${form.condType===o.v?o.col:C.border}`,borderRadius:7,padding:"9px 12px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:C.mono,fontSize:10,fontWeight:700,color:form.condType===o.v?o.col:C.mid}}>{o.l}</div>
                        <div style={{fontFamily:C.sans,fontSize:10,color:C.dim,marginTop:2}}>{o.n}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                        <Tag l={o.tag} c={o.col}/>
                        {cd&&cd.t>0&&<span style={{fontFamily:C.mono,fontSize:7,color:cWR>=50?C.green:C.red,background:(cWR>=50?C.green:C.red)+"15",padding:"1px 5px",borderRadius:2}}>{cd.t}T · {cWR}%WR</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
              {cond&&cond.rules.length>0&&<div style={{margin:"0 14px 12px",background:cond.col+"10",border:`1px solid ${cond.col}30`,borderRadius:7,padding:"10px 12px"}}><div style={{fontFamily:C.mono,fontSize:9,color:cond.col,letterSpacing:1,marginBottom:6}}>RULES FOR THIS CONDITION</div>{cond.rules.map((r,i)=><div key={i} style={{fontFamily:C.mono,fontSize:9,color:C.mid,marginBottom:3}}>· {r}</div>)}</div>}
              {form.condType==="cmc_side"&&<div style={{margin:"0 14px 12px",background:C.red+"15",border:`1px solid ${C.red}40`,borderRadius:7,padding:"10px 12px",fontFamily:C.mono,fontSize:9,color:C.red}}>⛔ SIDEWAYS — Stand aside.</div>}
            </Box>

            {/* 04 RHYTHM */}
            <Box ac={C.gold}>
              <Head step="03" label="RHYTHM / REACTIVITY" tag="TIMING" tc={C.gold} badge="0.6pt" bc={C.dim}/>
              <Lbl t="FIB LEVEL PRICE IS REACTING TO"/>
              <div style={{padding:"0 14px 8px"}}>
                {FIBS.map(o=>(
                  <button key={o.v} onClick={()=>upd("fibLevel",form.fibLevel===o.v?"":o.v)} style={{width:"100%",marginBottom:5,background:form.fibLevel===o.v?C.gold+"18":"transparent",border:`1px solid ${form.fibLevel===o.v?C.gold:C.border}`,borderRadius:6,padding:"8px 12px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontFamily:C.mono,fontSize:12,fontWeight:700,color:form.fibLevel===o.v?C.gold:C.mid,minWidth:42}}>{o.l}</span>
                    <span style={{fontFamily:C.sans,fontSize:10,color:C.dim}}>{o.n}</span>
                  </button>
                ))}
              </div>
              <YN label="2 consecutive reactions confirmed?" val={form.fibConfirmed} set={v=>upd("fibConfirmed",v)} y="✓ Confirmed" n="Not Yet"/>
            </Box>

            {/* 05 LIQUIDITY */}
            <Box ac={C.green}>
              <Head step="04" label="LIQUIDITY" tag="LQ" tc={C.green} badge="0.5pt" bc={C.dim}/>
              <Lbl t="TYPE(S) IN PLAY"/>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"0 14px 12px"}}>
                {LQS.map(t=>{const a=form.lqTypes.includes(t);return <button key={t} onClick={()=>togLQ(t)} style={{background:a?C.green+"22":"transparent",border:`1px solid ${a?C.green:C.border}`,borderRadius:20,padding:"5px 11px",color:a?C.green:C.mid,fontFamily:C.mono,fontSize:9,fontWeight:a?700:400,cursor:"pointer"}}>{t}</button>;})}
              </div>
              {form.lqTypes.includes("SnR Level")&&<div style={{margin:"0 14px 8px",background:C.yellow+"12",border:`1px solid ${C.yellow}30`,borderRadius:6,padding:"8px 10px"}}><span style={{fontFamily:C.mono,fontSize:9,color:C.yellow}}>⚠ SnR: Wait for 1st reaction to be taken. Trade the mitigation.</span></div>}
              <Lbl t="TRADING AWAY FROM LQ IN THIS DIRECTION"/>
              <div style={{display:"flex",gap:6,padding:"0 14px 12px"}}>
                {[["bullish","LONG ▲",C.green],["bearish","SHORT ▼",C.red]].map(([v,l,c])=>(
                  <button key={v} onClick={()=>upd("lqDir",form.lqDir===v?"":v)} style={{flex:1,padding:"9px",background:form.lqDir===v?c+"22":"transparent",border:`1px solid ${form.lqDir===v?c:C.border}`,borderRadius:6,color:form.lqDir===v?c:C.mid,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>{l}</button>
                ))}
              </div>
              {form.lqDir&&form.rangeDir&&form.lqDir!==form.rangeDir&&(
                score.isPullback&&form.lqDir===form.externalDir
                  ?<div style={{margin:"0 14px 12px",background:C.green+"12",border:`1px solid ${C.green}30`,borderRadius:6,padding:"8px 10px"}}><span style={{fontFamily:C.mono,fontSize:9,color:C.green}}>✓ LQ aligned with external {form.externalDir.toUpperCase()} trend — pullback sweep before continuation. Full LQ credit.</span></div>
                  :<div style={{margin:"0 14px 12px",background:C.red+"15",border:`1px solid ${C.red}40`,borderRadius:6,padding:"8px 10px"}}><span style={{fontFamily:C.mono,fontSize:9,color:C.red}}>⚡ Trading {form.lqDir.toUpperCase()} from LQ but ranges are {form.rangeDir.toUpperCase()} — cross-category conflict. Net arithmetic applied.</span></div>
              )}
            </Box>

            {/* 06 EXECUTION */}
            <Box ac={C.purple}>
              <Head step="05" label="EXECUTION — SET & FORGET" tag="RISK" tc={C.purple}/>
              <Lbl t="RISK ON ACCOUNT"/>
              {streakWarn&&<div style={{margin:"0 14px 8px",background:C.red+"15",border:`1px solid ${C.red}30`,borderRadius:6,padding:"7px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontFamily:C.mono,fontSize:9,color:C.red}}>⚠ {stats.streak} loss streak — drop to $25</span><button onClick={()=>upd("risk","25")} style={{fontFamily:C.mono,fontSize:8,color:C.red,background:C.red+"20",border:`1px solid ${C.red}40`,borderRadius:4,padding:"2px 8px",cursor:"pointer"}}>USE $25</button></div>}
              <div style={{display:"flex",gap:6,padding:"0 14px 6px"}}>
                {["25","50"].map(v=><button key={v} onClick={()=>upd("risk",v)} style={{flex:1,padding:"12px",background:form.risk===v?(streakWarn&&v==="50"?C.red+"15":C.purple+"22"):"transparent",border:`1px solid ${form.risk===v?(streakWarn&&v==="50"?C.red:C.purple):C.border}`,borderRadius:6,color:form.risk===v?(streakWarn&&v==="50"?C.red:C.purple):C.mid,fontFamily:C.mono,fontSize:15,fontWeight:700,cursor:"pointer"}}>${v}{streakWarn&&v==="50"?" ⚠":""}</button>)}
              </div>
              <div style={{padding:"0 14px 12px",fontFamily:C.mono,fontSize:9,color:C.dim}}>Max risk per trade. No exceptions.</div>
              <Lbl t="TAKE PROFIT EXPANSION"/>
              <div style={{display:"flex",gap:6,padding:"0 14px 14px"}}>
                {[["618","6.18","TMC · TRENDING",C.green],["272","2.72","CMC · NON-TREND",C.yellow]].map(([v,num,lbl,c])=>(
                  <button key={v} onClick={()=>upd("tp",form.tp===v?"":v)} style={{flex:1,padding:"12px 8px",background:form.tp===v?c+"18":"transparent",border:`1px solid ${form.tp===v?c:C.border}`,borderRadius:7,cursor:"pointer"}}>
                    <div style={{fontFamily:C.mono,fontSize:15,fontWeight:700,color:form.tp===v?c:C.mid}}>{num}</div>
                    <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginTop:3,letterSpacing:1}}>{lbl}</div>
                  </button>
                ))}
              </div>
              {form.tp==="618"&&cond&&!cond.isTMC&&<div style={{margin:"0 14px 12px",background:C.red+"12",border:`1px solid ${C.red}30`,borderRadius:6,padding:"7px 10px",fontFamily:C.mono,fontSize:9,color:C.red}}>⚡ 6.18 for {cond.l} — use 2.72. TP earns 0/0.4pt.</div>}
              {form.tp==="272"&&cond&&cond.isTMC&&form.condType!=="tmc_below50"&&<div style={{margin:"0 14px 12px",background:C.yellow+"12",border:`1px solid ${C.yellow}30`,borderRadius:6,padding:"7px 10px",fontFamily:C.mono,fontSize:9,color:C.yellow}}>⚠ 2.72 for {cond.l} — leaving profit on table. Use 6.18. TP earns 0/0.4pt.</div>}
            </Box>

            {/* 07 ENTRY MODEL */}
            <Box ac={C.orange}>
              <Head step="06" label="ENTRY MODEL" tag="ENTRY" tc={C.orange} badge="0.5 + 0.4pt TP" bc={C.dim}/>
              <div style={{padding:"8px 14px 4px"}}>
                {ENTRIES.map(o=>{
                  const active=form.entryModel===o.v;
                  return(
                    <div key={o.v} style={{marginBottom:6}}>
                      <button onClick={()=>{upd("entryModel",form.entryModel===o.v?"":o.v);upd("entryConfirmed",false);upd("entryChecks",{});}} style={{width:"100%",background:active?C.orange+"18":"transparent",border:`1px solid ${active?C.orange:C.border}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",textAlign:"left"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:active?4:0}}>
                          <span style={{fontFamily:C.mono,fontSize:10,fontWeight:700,color:active?C.orange:C.mid}}>{o.l}</span>
                          <span style={{fontFamily:C.mono,fontSize:8,color:active?C.orange:C.dim,background:(active?C.orange:C.dim)+"20",padding:"2px 7px",borderRadius:3}}>{o.tf}</span>
                        </div>
                        <div style={{fontFamily:C.sans,fontSize:10,color:C.dim,lineHeight:1.4}}>{o.n}</div>
                      </button>
                      {active&&(
                        <div style={{background:C.surf,border:`1px solid ${C.orange}30`,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:"none"}}>
                          <div style={{fontFamily:C.mono,fontSize:8,color:C.orange,letterSpacing:1.5,marginBottom:8}}>CONFIRM BEFORE ENTRY</div>
                          {o.confirms.map((q,i)=>{
                            const checked=form.entryChecks[i]===true;
                            return(
                              <button key={i} onClick={()=>{const nc={...form.entryChecks,[i]:!checked};upd("entryChecks",nc);upd("entryConfirmed",o.confirms.every((_,j)=>nc[j]===true));}} style={{width:"100%",display:"flex",alignItems:"flex-start",gap:10,padding:"6px 0",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
                                <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${checked?C.orange:C.dim}`,background:checked?C.orange:"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {checked&&<span style={{color:"#000",fontSize:10,fontWeight:700}}>✓</span>}
                                </div>
                                <span style={{fontFamily:C.mono,fontSize:9,color:checked?C.text:C.mid,lineHeight:1.4}}>{q}</span>
                              </button>
                            );
                          })}
                          {form.entryConfirmed&&<div style={{background:C.orange+"15",borderRadius:6,padding:"6px 10px",marginTop:8}}><span style={{fontFamily:C.mono,fontSize:9,color:C.orange,fontWeight:700}}>✓ Entry confirmed — 0.5pt earned.</span></div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {!form.entryModel&&<div style={{padding:"0 14px 12px",fontFamily:C.mono,fontSize:9,color:C.dim}}>Select your entry trigger before executing.</div>}
            </Box>

            <button onClick={()=>setTab("story")} style={{width:"100%",padding:"14px",background:score.validity==="VALID"?C.green+"18":C.surf,border:`1px solid ${score.validity==="VALID"?C.green:C.border}`,borderRadius:10,color:score.validity==="VALID"?C.green:C.mid,fontFamily:C.mono,fontSize:10,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>
              {score.validity==="VALID"?`✓ VIEW STORY — ${score.pct}% · VALID`:`BUILD STORY — ${score.pct}% · ${score.validity} · ${score.gaps.length} GAPS`}
            </button>
          </>)
        )}

        {/* STORY */}
        {tab==="story"&&(
          <div>
            {/* Score card */}
            <div style={{background:C.card,border:`1px solid ${score.validityCol}50`,borderLeft:`3px solid ${score.validityCol}`,borderRadius:10,padding:14,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,letterSpacing:1.5,marginBottom:6}}>TRADE VALIDITY</div>
                  <div style={{fontFamily:C.mono,fontSize:13,fontWeight:700,color:score.validityCol,letterSpacing:1,background:score.validityCol+"18",padding:"5px 12px",borderRadius:5,display:"inline-block"}}>{score.validity}</div>
                  <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginTop:6}}>Raw: {score.rawScore.toFixed(2)} / {score.maxTotal.toFixed(1)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,letterSpacing:1.5,marginBottom:4}}>CONFIDENCE</div>
                  <div style={{fontFamily:C.mono,fontSize:38,fontWeight:700,color:score.probCol,lineHeight:1}}>{score.pct}<span style={{fontSize:14}}>%</span></div>
                  <div style={{fontFamily:C.mono,fontSize:9,color:score.probCol,fontWeight:700,letterSpacing:1,marginTop:2}}>{score.probLabel}</div>
                </div>
              </div>
              <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${score.pct}%`,background:score.probCol,borderRadius:3,transition:"width .5s"}}/></div>
              {score.keyConflicts.length>0&&(
                <div style={{background:C.red+"10",border:`1px solid ${C.red}25`,borderRadius:6,padding:"8px 10px",marginBottom:12}}>
                  <div style={{fontFamily:C.mono,fontSize:8,color:C.red,letterSpacing:1.5,marginBottom:5}}>KEY CONFLICTS — {score.keyConflicts.length} DETECTED</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>{score.keyConflicts.map((k,i)=><span key={i} style={{fontFamily:C.mono,fontSize:8,fontWeight:700,color:C.red,background:C.red+"20",padding:"2px 7px",borderRadius:3}}>⚡ {k}</span>)}</div>
                  {score.highConflicts>=2&&<div style={{fontFamily:C.mono,fontSize:8,color:C.red,fontWeight:700}}>2+ high conflicts — INVALID. Do not trade.</div>}
                  {score.highConflicts===1&&<div style={{fontFamily:C.mono,fontSize:8,color:C.orange}}>1 high conflict — LOW CONFIDENCE. Reduce size or stand aside.</div>}
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {score.buckets.map((b,i)=>{
                  const isExcluded=b.max===0;
                  const fp=isExcluded?0:Math.round((b.earned/b.max)*100);
                  const barCol=isExcluded?C.dim:b.earned===0?C.dim:b.earned<b.max?C.yellow:b.col;
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontFamily:C.mono,fontSize:8,color:b.earned===0?C.dim:C.mid,minWidth:50,textAlign:"right"}}>{b.label}</span>
                      <div style={{flex:1,height:11,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(0,Math.min(100,fp))}%`,background:barCol,borderRadius:2,transition:"width .4s"}}/></div>
                      <span style={{fontFamily:C.mono,fontSize:8,color:isExcluded?C.dim:b.earned===0?C.dim:barCol,minWidth:56,textAlign:"right"}}>{isExcluded?"N/A":`${b.earned.toFixed(2)}/${b.max.toFixed(1)}`}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginTop:8,textAlign:"right"}}>{score.rawScore.toFixed(2)} ÷ {score.maxTotal.toFixed(1)} × 100 = {score.pct}%</div>
            </div>

            {/* Narrative */}
            <div style={{background:C.card,border:`1px solid ${score.validity==="VALID"?C.green:C.border}`,borderLeft:`3px solid ${score.validity==="VALID"?C.green:C.yellow}`,borderRadius:10,padding:16,marginBottom:10}}>
              <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:10}}>YOUR TRADE STORY</div>
              <div style={{fontFamily:C.sans,fontSize:13,color:C.text,lineHeight:1.8,fontStyle:"italic"}}>"{narrative||"Fill in the analysis to generate your trade story."}"</div>
            </div>

            {/* Notes — informational, non-penalizing (e.g. internal pullback, MA exclusion) */}
            {score.warns.length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:6}}>NOTES</div>
                {score.warns.map((wmsg,i)=>(
                  <div key={i} style={{background:C.blue+"0a",border:`1px solid ${C.blue}25`,borderLeft:`3px solid ${C.blue}`,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontFamily:C.mono,fontSize:8,fontWeight:700,color:C.blue,background:C.blue+"20",padding:"1px 5px",borderRadius:3,flexShrink:0,marginTop:1}}>ⓘ</span>
                    <span style={{fontSize:12,color:C.mid,lineHeight:1.5}}>{wmsg}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Conflicts */}
            {score.conflicts.filter(c=>c.sev==="high").length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:6}}>OPPOSING CONFLUENCES</div>
                {score.conflicts.filter(c=>c.sev==="high").map((c,i)=>(
                  <div key={i} style={{background:"#1a0808",border:`1px solid ${C.red}30`,borderLeft:`3px solid ${C.red}`,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontFamily:C.mono,fontSize:8,fontWeight:700,color:C.red,background:C.red+"20",padding:"1px 5px",borderRadius:3,flexShrink:0,marginTop:1}}>HIGH</span>
                    <span style={{fontSize:12,color:"#fca5a5",lineHeight:1.5}}>{c.msg}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Gaps */}
            {score.gaps.length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:6}}>INCOMPLETE</div>
                {score.gaps.map((g,i)=>(
                  <div key={i} style={{background:"#1a0a0a",border:`1px solid ${C.red}25`,borderLeft:`3px solid ${C.red}`,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",gap:8}}>
                    <span style={{fontFamily:C.mono,fontSize:9,color:C.red,flexShrink:0,marginTop:2}}>✗</span>
                    <span style={{fontSize:12,color:"#fca5a5",lineHeight:1.5}}>{g}</span>
                  </div>
                ))}
              </div>
            )}

            {cond&&cond.rules.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${cond.col}`,borderRadius:8,padding:"10px 12px",marginBottom:10}}><div style={{fontFamily:C.mono,fontSize:9,color:cond.col,letterSpacing:1,marginBottom:6}}>RULES · {cond.l.toUpperCase()}</div>{cond.rules.map((r,i)=><div key={i} style={{fontFamily:C.mono,fontSize:10,color:C.mid,marginBottom:3}}>· {r}</div>)}</div>}

            {score.validity==="VALID"&&<div style={{background:C.green+"12",border:`1px solid ${C.green}50`,borderRadius:10,padding:16,textAlign:"center",marginBottom:10}}><div style={{fontFamily:C.mono,fontSize:11,color:C.green,letterSpacing:2,fontWeight:700}}>STORY VALID — {score.pct}% CONFIDENCE</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,marginTop:4}}>Set entry, SL, TP — then walk away.</div></div>}

            {/* Log trade — outcome unknown yet, defaults to PENDING */}
            {logMode?(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:10}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:10}}>LOG TRADE — PENDING</div>
                {!sast.isNY&&(
                  <div style={{background:C.red+"15",border:`1px solid ${C.red}40`,borderRadius:6,padding:"10px 12px",marginBottom:12}}>
                    <span style={{fontFamily:C.mono,fontSize:9,color:C.red,fontWeight:700}}>⛔ NY SESSION ONLY — Cannot log a trade outside 14:00–21:00 SAST. Current time: {sast.timeStr}.</span>
                  </div>
                )}
                {sast.isNY&&(
                  <div style={{background:C.blue+"12",border:`1px solid ${C.blue}30`,borderRadius:6,padding:"8px 10px",marginBottom:12}}>
                    <span style={{fontFamily:C.mono,fontSize:9,color:C.blue}}>This trade will be saved as PENDING. Close out the outcome later from the LOG tab once the trade has played out.</span>
                  </div>
                )}
                <Lbl t="SETUP GRADE"/>
                <div style={{display:"flex",gap:6,padding:"0 0 12px"}}>
                  {GRADES.map(g=>(
                    <button key={g.v} onClick={()=>setPGrade(g.v)} style={{flex:1,padding:"9px 4px",background:pGrade===g.v?g.col+"25":"transparent",border:`1px solid ${pGrade===g.v?g.col:C.border}`,borderRadius:7,cursor:"pointer"}}>
                      <div style={{fontFamily:C.mono,fontSize:13,fontWeight:700,color:pGrade===g.v?g.col:C.mid}}>{g.l}</div>
                      <div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginTop:2}}>{g.n}</div>
                    </button>
                  ))}
                </div>
                <Lbl t="TRADE NOTE"/>
                <textarea value={pNote} onChange={e=>setPNote(e.target.value)} placeholder="e.g. Entry at X, SL at Y, TP at Z..." rows={2} style={{width:"100%",background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,color:C.mid,fontSize:11,padding:"7px 9px",fontFamily:C.mono,resize:"none",marginBottom:10,display:"block"}}/>
                <Lbl t="CHART URL (optional)"/>
                <input value={pChart} onChange={e=>setPChart(e.target.value)} placeholder="Paste TradingView screenshot or image link..." style={{width:"100%",background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,color:C.mid,fontSize:11,padding:"7px 9px",fontFamily:C.mono,marginBottom:10,display:"block"}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveEntry} disabled={!sast.isNY} style={{flex:2,padding:"11px",background:sast.isNY?C.gold+"20":C.surf,border:`1px solid ${sast.isNY?C.gold:C.border}`,borderRadius:7,color:sast.isNY?C.gold:C.dim,fontFamily:C.mono,fontSize:10,fontWeight:700,cursor:sast.isNY?"pointer":"default"}}>SAVE AS PENDING</button>
                  <button onClick={()=>{setLogMode(false);setPGrade(null);setPNote("");setPChart("");}} style={{flex:1,padding:"11px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,color:C.mid,fontFamily:C.mono,fontSize:9,cursor:"pointer"}}>CANCEL</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setLogMode(true)} style={{width:"100%",padding:"12px",marginBottom:8,background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,color:C.mid,fontFamily:C.mono,fontSize:10,fontWeight:700,letterSpacing:1.5,cursor:"pointer"}}>+ LOG TRADE TO JOURNAL</button>
            )}
            <button onClick={()=>{setForm(initForm());setGatePassed(false);setGateAnswers({news:null,emotion:null});setTab("gate");}} style={{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontFamily:C.mono,fontSize:9,letterSpacing:1,cursor:"pointer"}}>↺ RESET FOR NEXT TRADE</button>
          </div>
        )}

        {/* STATS */}
        {tab==="stats"&&(
          <div>
            {weeklyData[sast.weekKey]?.saved?(
              <div style={{background:C.gold+"0a",border:`1px solid ${C.gold}25`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontFamily:C.mono,fontSize:9,color:C.gold,letterSpacing:1.5}}>THIS WEEK'S FOCUS</div>
                  <button onClick={()=>setShowWeekly(true)} style={{fontFamily:C.mono,fontSize:8,color:C.dim,background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 7px",cursor:"pointer"}}>EDIT</button>
                </div>
                {[weeklyData[sast.weekKey].focus1,weeklyData[sast.weekKey].focus2,weeklyData[sast.weekKey].focus3].filter(Boolean).map((f,i)=>(
                  <div key={i} style={{fontFamily:C.mono,fontSize:9,color:C.mid,marginBottom:4}}>· {f}</div>
                ))}
              </div>
            ):(
              <button onClick={()=>setShowWeekly(true)} style={{width:"100%",marginBottom:12,padding:"10px",background:"transparent",border:`1px solid ${C.gold}30`,borderRadius:8,color:C.gold,fontFamily:C.mono,fontSize:9,cursor:"pointer",letterSpacing:1}}>+ SET THIS WEEK'S FOCUS AREAS</button>
            )}

            {/* Confidence trend */}
            {journal.filter(e=>e.outcome!=="pending").length>=3&&(()=>{
              const last20=journal.filter(e=>e.outcome!=="pending").slice(0,20).reverse();
              const maxH=60;
              return(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:10}}>CONFIDENCE TREND — LAST {last20.length} CLOSED TRADES</div>
                  <div style={{position:"relative",height:maxH+20,marginBottom:4}}>
                    {[0,25,50,75,100].map(v=><div key={v} style={{position:"absolute",left:0,right:0,bottom:v*maxH/100,height:1,background:C.border,opacity:0.5}}/>)}
                    <div style={{display:"flex",alignItems:"flex-end",height:"100%",gap:2}}>
                      {last20.map((e,i)=>{
                        const pct=e.score||0;
                        const oc=e.outcome==="win"?C.green:e.outcome==="loss"?C.red:C.yellow;
                        const h=Math.max(2,(pct/100)*maxH);
                        return(
                          <div key={i} title={`${e.date}: ${pct}% · ${e.outcome}`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                            <div style={{width:"100%",height:h,background:oc+"88",borderRadius:"2px 2px 0 0",minHeight:2}}/>
                          </div>
                        );
                      })}
                    </div>
                    {[0,50,100].map(v=><div key={v} style={{position:"absolute",left:-2,bottom:v*maxH/100-4,fontFamily:C.mono,fontSize:6,color:C.dim}}>{v}%</div>)}
                  </div>
                  <div style={{display:"flex",gap:10,marginTop:6}}>
                    {[[C.green,"Win"],[C.red,"Loss"],[C.yellow,"B/E"]].map(([c,l])=>(
                      <div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:c+"88"}}/><span style={{fontFamily:C.mono,fontSize:7,color:C.dim}}>{l}</span></div>
                    ))}
                    <span style={{fontFamily:C.mono,fontSize:7,color:C.dim,marginLeft:"auto"}}>Bar height = confidence %</span>
                  </div>
                </div>
              );
            })()}

            {stats.insights.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>PATTERN INSIGHTS</div>
                {stats.insights.map((ins,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.gold}`,borderRadius:8,padding:"10px 14px",marginBottom:8,fontFamily:C.sans,fontSize:12,color:C.text,lineHeight:1.6}}>💡 {ins}</div>)}
              </div>
            )}

            <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>ALL-TIME</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:14}}>
              <Stat label="WIN RATE" val={`${stats.allWR}%`} col={stats.allWR>=50?C.green:C.red}/>
              <Stat label="CLOSED" val={stats.total} col={C.text}/>
              <Stat label="PENDING" val={stats.pendingCount} col={stats.pendingCount>0?C.blue:C.dim}/>
              <Stat label="THIS WEEK" val={stats.weekTotal} col={C.blue} sub={`${stats.weekWR}% WR`}/>
            </div>

            {stats.processFollowed>0&&<><div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>PROCESS DISCIPLINE</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}><Stat label="PROCESS WR" val={`${stats.processWR}%`} col={stats.processWR>=50?C.green:C.red} sub="When followed"/><Stat label="OFF-PROCESS WR" val={`${stats.noProcessWR}%`} col={stats.noProcessWR>=50?C.yellow:C.red} sub="When deviated"/></div></>}

            <div style={{background:C.card,border:`1px solid ${stats.locked?C.red:C.green}40`,borderLeft:`3px solid ${stats.locked?C.red:C.green}`,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>TODAY'S LOSS TRACKER</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontFamily:C.mono,fontSize:22,fontWeight:700,color:stats.locked?C.red:C.green}}>${stats.todayLoss.toFixed(0)}</span>
                <span style={{fontFamily:C.mono,fontSize:11,color:C.dim}}>/ ${settings.maxLoss} limit</span>
              </div>
              <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((stats.todayLoss/settings.maxLoss)*100,100)}%`,background:stats.locked?C.red:C.green,borderRadius:3,transition:"width .4s"}}/></div>
            </div>

            {stats.streakType&&<div style={{background:C.card,border:`1px solid ${streakCol}40`,borderLeft:`3px solid ${streakCol}`,borderRadius:10,padding:"12px 14px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:4}}>CURRENT STREAK</div><div style={{fontFamily:C.mono,fontSize:9,color:streakCol}}>{streakWarn?"⚠ Reduce size or step back":stats.streakType==="win"?"Keep following the process":"Stay disciplined"}</div></div><div style={{textAlign:"right"}}><div style={{fontFamily:C.mono,fontSize:32,fontWeight:700,color:streakCol,lineHeight:1}}>{stats.streak}✕</div><div style={{fontFamily:C.mono,fontSize:9,color:streakCol,letterSpacing:1}}>{stats.streakType==="win"?"WINS":"LOSSES"}</div></div></div>}

            {Object.keys(stats.grades).length>0&&<><div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>GRADE PERFORMANCE</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:14}}>{GRADES.map(g=>{const d=stats.grades[g.v]||{w:0,t:0};const w=d.t?Math.round(d.w/d.t*100):null;return <Stat key={g.v} label={`GRADE ${g.v}`} val={w!==null?`${w}%`:"—"} sub={d.t?`${d.t} trades`:"No data"} col={g.col}/>;})}</div></>}

            <div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>YOUR EDGE</div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.gold}`,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
              {[["Best Condition",stats.bestCond?`${CONDS.find(o=>o.v===stats.bestCond[0])?.l||stats.bestCond[0]} · ${Math.round(stats.bestCond[1].w/stats.bestCond[1].t*100)}% WR`:"Need ≥2 trades per condition",C.blue],["Best LQ",stats.bestLQ?`${stats.bestLQ[0]} · ${Math.round(stats.bestLQ[1].w/stats.bestLQ[1].t*100)}% WR`:"Need ≥2 trades per LQ",C.green],["Best Session",stats.bestSession?`${stats.bestSession[0]} · ${Math.round(stats.bestSession[1].w/stats.bestSession[1].t*100)}% WR`:"Need ≥2 per session",C.purple],["Best Entry",stats.bestEntry?`${ENTRIES.find(o=>o.v===stats.bestEntry[0])?.l||stats.bestEntry[0]} · ${Math.round(stats.bestEntry[1].w/stats.bestEntry[1].t*100)}% WR`:"Need ≥2 per entry model",C.orange]].map(([lbl,val,c])=>(
                <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{lbl}</span>
                  <span style={{fontFamily:C.mono,fontSize:9,color:c,fontWeight:700,textAlign:"right",maxWidth:"60%"}}>{val}</span>
                </div>
              ))}
            </div>

            {stats.weekTotal>0&&<><div style={{fontFamily:C.mono,fontSize:9,color:C.dim,letterSpacing:1.5,marginBottom:8}}>THIS WEEK</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:14}}><Stat label="WIN RATE" val={`${stats.weekWR}%`} col={stats.weekWR>=50?C.green:C.red}/><Stat label="TRADES" val={stats.weekTotal} col={C.text}/><Stat label="WINS" val={stats.weekly.filter(e=>e.outcome==="win").length} col={C.green}/><Stat label="LOSSES" val={stats.weekly.filter(e=>e.outcome==="loss").length} col={C.red}/></div></>}

            {journal.length===0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:30,textAlign:"center"}}><div style={{fontFamily:C.mono,fontSize:10,color:C.dim}}>No trades logged yet.</div><div style={{fontFamily:C.mono,fontSize:9,color:C.dim,marginTop:4}}>Log trades to see your patterns here.</div></div>}
          </div>
        )}

        {/* JOURNAL */}
        {tab==="journal"&&(
          <div>
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              {[["all","ALL"],["pending","PENDING"],["win","WINS"],["loss","LOSSES"],["breakeven","B/E"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFilter(v)} style={{flex:1,minWidth:60,padding:"7px 4px",background:filter===v?C.gold+"20":"transparent",border:`1px solid ${filter===v?C.gold:C.border}`,borderRadius:6,color:filter===v?C.gold:C.dim,fontFamily:C.mono,fontSize:9,fontWeight:700,letterSpacing:1,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
            {filtered.length===0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:30,textAlign:"center"}}><div style={{fontFamily:C.mono,fontSize:10,color:C.dim}}>No trades here yet.</div></div>}
            {filtered.map(e=>{
              const oc=e.outcome==="win"?C.green:e.outcome==="loss"?C.red:e.outcome==="pending"?C.blue:C.yellow;
              const gc=e.grade==="A"?C.green:e.grade==="B"?C.yellow:e.grade==="C"?C.orange:C.dim;
              return(
                <div key={e.id} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${oc}`,borderRadius:10,padding:12,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexWrap:"wrap"}}>
                        <Tag l={e.outcome==="pending"?"PENDING ⏳":(e.outcome||"").toUpperCase()} c={oc}/>
                        {e.grade&&<Tag l={`GRADE ${e.grade}`} c={gc}/>}
                        {e.score!=null&&<Tag l={`${e.score}%`} c={e.score>=70?C.green:e.score>=40?C.yellow:C.red} sm/>}
                        {e.validity&&<Tag l={e.validity} c={e.validity==="VALID"?C.green:e.validity==="LOW CONFIDENCE"?C.orange:C.red} sm/>}
                        {e.direction&&<Tag l={e.direction==="bullish"?"LONG":"SHORT"} c={e.direction==="bullish"?C.green:C.red} sm/>}
                        {e.followedProcess===true&&<Tag l="PROCESS ✓" c={C.green} sm/>}
                        {e.followedProcess===false&&<Tag l="DEVIATED" c={C.red} sm/>}
                        {e.replayDone&&<Tag l="REPLAYED" c={C.purple} sm/>}
                      </div>
                      <div style={{fontFamily:C.mono,fontSize:9,color:C.dim}}>{e.date} · {e.time} · {e.session}</div>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {e.outcome!=="pending"&&<button onClick={()=>setReplayE(e)} style={{background:"transparent",border:`1px solid ${e.replayDone?C.purple:C.border}`,borderRadius:4,color:e.replayDone?C.purple:C.dim,padding:"3px 7px",fontFamily:C.mono,fontSize:8,cursor:"pointer"}}>{e.replayDone?"✓REPLAY":"REPLAY"}</button>}
                      {e.outcome!=="pending"&&<button onClick={()=>setReviewE(e)} style={{background:"transparent",border:`1px solid ${e.followedProcess!==null&&e.followedProcess!==undefined?C.gold:C.border}`,borderRadius:4,color:e.followedProcess!==null&&e.followedProcess!==undefined?C.gold:C.dim,padding:"3px 7px",fontFamily:C.mono,fontSize:8,cursor:"pointer"}}>{e.followedProcess!==null&&e.followedProcess!==undefined?"✓REV":"REVIEW"}</button>}
                      <button onClick={()=>delEntry(e.id)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.dim,padding:"3px 7px",fontFamily:C.mono,fontSize:8,cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                    {e.condition&&<Tag l={CONDS.find(o=>o.v===e.condition)?.l||e.condition} c={C.blue} sm/>}
                    {e.fibLevel&&<Tag l={`FIB ${FIBS.find(o=>o.v===e.fibLevel)?.l||e.fibLevel}`} c={C.gold} sm/>}
                    {e.entryModel&&<Tag l={ENTRIES.find(o=>o.v===e.entryModel)?.l||e.entryModel} c={C.orange} sm/>}
                    {(e.lqTypes||[]).map(t=><Tag key={t} l={t} c={C.green} sm/>)}
                  </div>
                  {e.dailyBiasNote&&<div style={{background:C.gold+"0a",border:`1px solid ${C.gold}20`,borderRadius:6,padding:"6px 10px",marginBottom:8}}><div style={{fontFamily:C.mono,fontSize:8,color:C.gold,marginBottom:2,letterSpacing:1}}>DAY BIAS</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid}}>{e.dailyBiasNote}</div></div>}
                  {e.narrative&&<div style={{background:C.surf,borderRadius:6,padding:"8px 10px",marginBottom:8}}><div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginBottom:4,letterSpacing:1}}>STORY</div><div style={{fontFamily:C.sans,fontSize:10,color:C.mid,lineHeight:1.6,fontStyle:"italic"}}>"{e.narrative}"</div></div>}
                  {e.chartUrl&&<div style={{marginBottom:8}}><div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginBottom:4,letterSpacing:1}}>CHART</div><img src={e.chartUrl} alt="chart" onError={ev=>{ev.target.style.display="none";}} style={{width:"100%",borderRadius:6,border:`1px solid ${C.border}`,display:"block",maxHeight:200,objectFit:"contain",background:C.surf}}/></div>}
                  {(e.conflicts||[]).filter(c=>c.sev==="high").length>0&&<div style={{background:"#1a0808",borderRadius:6,padding:"7px 10px",marginBottom:8}}>{(e.conflicts||[]).filter(c=>c.sev==="high").map((c,j)=><div key={j} style={{fontFamily:C.mono,fontSize:9,color:"#fca5a5",marginBottom:2,lineHeight:1.4}}>⚡ {c.msg||c}</div>)}</div>}
                  {e.reviewNote&&<div style={{background:C.surf,borderRadius:6,padding:"7px 10px",marginBottom:6,borderLeft:`2px solid ${e.followedProcess?C.green:C.red}`}}><div style={{fontFamily:C.mono,fontSize:8,color:C.dim,marginBottom:3,letterSpacing:1}}>REVIEW</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,lineHeight:1.4}}>{e.reviewNote}</div></div>}
                  {e.replayNote&&<div style={{background:C.purple+"0a",border:`1px solid ${C.purple}25`,borderLeft:`2px solid ${C.purple}`,borderRadius:6,padding:"7px 10px",marginTop:6}}><div style={{fontFamily:C.mono,fontSize:8,color:C.purple,marginBottom:3,letterSpacing:1}}>REPLAY LESSON</div><div style={{fontFamily:C.mono,fontSize:9,color:C.mid,lineHeight:1.4}}>{e.replayNote}</div></div>}
                  {e.outcome==="pending"&&(
                    <div style={{marginTop:8,padding:"10px",background:C.surf,borderRadius:6,border:`1px solid ${C.blue}25`}}>
                      <div style={{fontFamily:C.mono,fontSize:8,color:C.blue,marginBottom:8,letterSpacing:1}}>CLOSE TRADE</div>
                      <div style={{display:"flex",gap:6,marginBottom:8}}>
                        <input
                          placeholder="Exit Price"
                          value={e.exitPrice||""}
                          onChange={ev=>updateEntry(e.id,{exitPrice:ev.target.value})}
                          style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:4,color:C.text,fontSize:10,padding:"6px 8px",fontFamily:C.mono}}
                        />
                        <input
                          placeholder="P&L $"
                          type="number"
                          value={e.tempPnl||""}
                          onChange={ev=>updateEntry(e.id,{tempPnl:ev.target.value})}
                          style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:4,color:C.text,fontSize:10,padding:"6px 8px",fontFamily:C.mono}}
                        />
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        {[["win","WIN",C.green],["loss","LOSS",C.red],["breakeven","B/E",C.yellow]].map(([v,l,c])=>(
                          <button
                            key={v}
                            onClick={()=>{
                              const pnl=parseFloat(e.tempPnl)||0;
                              updateEntry(e.id,{
                                outcome:v,
                                netProfit:pnl,
                                exitDate:sast.dateStr,
                                exitTime:sast.timeStr
                              });
                            }}
                            style={{flex:1,padding:"8px",background:c+"22",border:`1px solid ${c}`,borderRadius:5,color:c,fontFamily:C.mono,fontSize:9,fontWeight:700,cursor:"pointer"}}
                          >{l}</button>
                        ))}
                      </div>
                    </div>
                  )}
                  {!e.replayDone&&e.outcome!=="pending"&&<button onClick={()=>setReplayE(e)} style={{width:"100%",marginTop:6,padding:"7px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,fontFamily:C.mono,fontSize:8,cursor:"pointer",letterSpacing:1}}>+ REPLAY THIS TRADE</button>}
                </div>
              );
            })}
            {journal.length>0&&<button onClick={()=>{if(window.confirm("Clear ALL journal entries?")){{setJournal([]);saveJ([]);}}}} style={{width:"100%",marginTop:8,padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.dim,fontFamily:C.mono,fontSize:9,cursor:"pointer"}}>↺ CLEAR ALL ENTRIES</button>}
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
