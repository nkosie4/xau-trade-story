function getSAST(){
  const now=new Date();
  const s=new Date(now.toLocaleString("en-US",{timeZone:"Africa/Johannesburg"}));
  const h=s.getHours(),m=s.getMinutes(),d=h+m/60;
  const pad=n=>String(n).padStart(2,"0");
  const timeStr=`${pad(h)}:${pad(m)}`;
  const dateStr=s.toLocaleDateString("en-ZA",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
  const todayKey=s.toLocaleDateString("en-ZA");
  const ws=new Date(s);ws.setDate(s.getDate()-s.getDay());ws.setHours(0,0,0,0);
  const weekKey=ws.toLocaleDateString("en-ZA");

  // ===== NY ONLY WINDOW =====
  // NY Session: 14:00 - 21:00 SAST (2 PM - 9 PM)
  // Pre-NY: 13:00 - 14:00 (dead zone, no trades)
  // Post-NY: 21:00+ (no trades)
  const isNY=d>=14&&d<21;
  const isPreNY=d>=13&&d<14;
  const isPostNY=d>=21;

  let session="BLOCKED",sc="#ff4d6a";
  let alert=null;

  if(isPreNY){
    alert={msg:"⛔ Pre-NY Dead Zone — No trades (1 PM - 2 PM SAST)",col:"#ff4d6a"};
  } else if(isPostNY){
    alert={msg:"⛔ NY Session Closed — No trades after 9 PM",col:"#ff4d6a"};
  } else if(isNY){
    session="NY SESSION";
    sc="#00d97e";
    if(d<14.5){
      session="NY OPEN";
      alert={msg:"⚠ NY Open — Wait 30 min for volatility to settle",col:"#fbbf24"};
    } else if(d>=16.5&&d<17.5){
      alert={msg:"↩ London Close Overlap — Watch for reversal",col:"#a78bfa"};
    }
  } else {
    alert={msg:"⛔ Outside NY Session — No trades",col:"#ff4d6a"};
  }

  return{timeStr,dateStr,todayKey,weekKey,session,sc,isNY,alert,isPreNY,isPostNY};
}

const CONDS=[
  {v:"tmc_above50",l:"TMC · Above 50%",n:"Trend remains dominant — standard/aggressive entries",col:"#00d97e",tag:"TRENDING",isTMC:true,rules:["Enter aggressively — price won't wait","TP at 6.18 expansion","Don't wait for deep pullbacks"]},
  {v:"tmc_below50",l:"TMC · Below 50%",n:"61.8–78.6% — treat like CMC",col:"#fbbf24",tag:"CAUTION",isTMC:false,rules:["Lighter position — treat like CMC","TP at 2.72 expansion","Price may range before continuing"]},
  {v:"cmc_bull",l:"CMC · Bullish",n:"Counter-trend — short fast trades",col:"#60a5fa",tag:"COUNTER",isTMC:false,rules:["Fast trades — take profits quickly","TP at 2.72 expansion","Don't overstay — main trend resumes"]},
  {v:"cmc_bear",l:"CMC · Bearish",n:"Counter-trend — short fast trades",col:"#60a5fa",tag:"COUNTER",isTMC:false,rules:["Fast trades — take profits quickly","TP at 2.72 expansion","Don't overstay — main trend resumes"]},
  {v:"cmc_side",l:"CMC · Sideways",n:"No trade — stand aside",col:"#ff4d6a",tag:"AVOID",isTMC:false,rules:[]},
];
const FIBS=[
  {v:"236",l:"23.6%",n:"Running fast — very aggressive",fast:true,slow:false},
  {v:"382",l:"38.2%",n:"Moderate pace",fast:false,slow:false},
  {v:"50",l:"50.0%",n:"Standard rhythm — ideal",fast:false,slow:false},
  {v:"618",l:"61.8%",n:"Crawling — lower conviction",fast:false,slow:true},
  {v:"786",l:"78.6%",n:"Very slow — consider skipping",fast:false,slow:true},
];
const LQS=["LQ Cycle","LIT (continuation)","SnR Level","Prev Day H/L","Asia H/L","4H/2H/1H Fractal"];
const GRADES=[{v:"A",l:"A",n:"All confluences aligned",col:"#00d97e"},{v:"B",l:"B",n:"Good setup, minor gaps",col:"#fbbf24"},{v:"C",l:"C",n:"Marginal — lower size",col:"#f97316"}];
const ENTRIES=[
  {v:"of_shift",l:"Orderflow Shift",tf:"5M/15M",n:"2 confirmed ranges in direction. Enter on break of second range.",
   confirms:["2 ranges confirmed on 5M or 15M in trade direction?","Break of second range has occurred?","SL placed below last internal low/high?"]},
  {v:"lq_mitig",l:"LQ → Reaction → Mitigation",tf:"5M/15M",n:"LQ swept, initial reaction, then mitigate. Enter at mitigation only.",
   confirms:["LQ level has been swept (stop hunt confirmed)?","Initial reaction move has printed?","Price has pulled back to mitigate the initial reaction?","Entry is at mitigation zone — NOT the initial spike?"]},
  {v:"reactivity",l:"Reactivity / Fib",tf:"5M",n:"3rd reaction at rhythm fib level. 5M rejection or engulfing confirms.",
   confirms:["2 prior reactions at this exact fib level confirmed?","Price has returned to the fib zone a 3rd time?","5M shows rejection wick or engulfing candle?"]},
  {v:"thirty_min",l:"30 Minute Entry",tf:"30M",n:"30M body close with clear direction. Enter on structure break. Size down.",
   confirms:["30M candle has closed with a clear directional body?","30M structure break in trade direction has occurred?","Position sized down for wider 30M stop?"]},
];

const W={ranges:0.9,ma:0.8,cond:0.7,rhythm:0.6,lq:0.5,entry:0.5,tp:0.4,session:0.3};
const MAX_TOTAL=Object.values(W).reduce((a,b)=>a+b,0);

function weightedScore(f,isNY){
  const gaps=[],kc=[],ac=[],wm=[];
  let bR=0,bM=0,bC=0,bRh=0,bL=0,bE=0,bT=0,bS=0;
  let ded=0;

  // Deep-fib MA exclusion (Problem 2): at 61.8%/78.6%, SMAs cross/tangle and
  // their "alignment" is noise, not signal. Drop MA from scoring entirely
  // and redistribute its weight proportionally across remaining categories
  // so MAX_TOTAL stays constant and percentages remain comparable.
  const maExcluded=f.fibLevel==="618"||f.fibLevel==="786";
  const wKeys=["ranges","cond","rhythm","lq","entry","tp","session"];
  const remainingSum=wKeys.reduce((a,k)=>a+W[k],0);
  const redist=maExcluded?MAX_TOTAL/remainingSum:1;
  const w=key=>maExcluded&&wKeys.includes(key)?W[key]*redist:W[key];

  // Pullback detection (Problem 1): an internal range running counter to the
  // external trend is a recognized pullback-in-trend setup — not a conflict.
  const isPullback=(
    f.rangeType==="internal"&&
    f.externalDir&&f.internalDir&&
    f.externalDir!==f.internalDir
  );

  // Range hierarchy (Problem 1): an internal pullback running counter to the
  // external trend is normal structure, not a conflict. Full ranges credit
  // either way — just surface an informational note so the trader confirms
  // their Market Condition selection (likely CMC) matches the pullback.
  if(!f.rangeDir||!f.rangeType){gaps.push("Range direction or type not confirmed");}
  else{
    bR=w("ranges");
    if(isPullback){
      wm.push(`Pullback entry — internal ${f.internalDir.toUpperCase()} within external ${f.externalDir.toUpperCase()} trend. Full range credit.`);
      // If LQ aligns with external trend, full LQ credit too (sweep before continuation)
      if(f.lqDir&&f.lqDir===f.externalDir){
        bL=w("lq");
        wm.push("LQ aligned with external trend — pullback liquidity sweep.");
      }
    }
  }

  if(maExcluded){
    bM=0;
    wm.push("Deep fib (61.8%/78.6%) — MAs cross/tangle here and are excluded from scoring. Weight redistributed.");
  } else {
    const maVals=[f.ma50,f.ma100,f.ma200];
    const maAligned=maVals.filter(v=>v==="aligned").length;
    const maConflict=maVals.filter(v=>v==="conflict").length;
    const maSet=maVals.filter(v=>v&&v!=="").length;
    if(maSet===0){}
    else if(maAligned===3)bM=W.ma;
    else if(maAligned===2)bM=Math.round(W.ma*(2/3)*100)/100;
    else if(maAligned===1)bM=Math.round(W.ma*(1/3)*100)/100;
    else{bM=0;ac.push({sev:"med",cat:"ma",msg:"All MAs conflict — no MA support. MA earns 0/0.8."});kc.push("Moving Averages");}
    if(maAligned>0&&maConflict>0&&maSet===3)ac.push({sev:"med",cat:"ma_partial",msg:`${maAligned}/3 MAs aligned (${bM.toFixed(2)}/0.8pt).`});
  }

  const cond=CONDS.find(o=>o.v===f.condType);
  if(!f.condType){gaps.push("Market condition not identified");}
  else if(f.condType==="cmc_side"){gaps.push("CMC SIDEWAYS — DO NOT TRADE.");}
  else bC=w("cond");

  const fib=FIBS.find(o=>o.v===f.fibLevel);
  if(!f.fibLevel){gaps.push("Rhythm fib level not set");}
  else if(!f.fibConfirmed){gaps.push("Rhythm not confirmed — need 2 consecutive reactions");}
  else bRh=w("rhythm");

  if(!f.lqTypes.length){gaps.push("No liquidity type identified");}
  else if(!f.lqDir){gaps.push("LQ direction not set");}
  else if(!isPullback||!f.lqDir||f.lqDir!==f.externalDir){
    // Only set bL here if not already credited via the pullback exception above
    bL=w("lq");
  }

  if(!f.entryModel){gaps.push("Entry model not selected");}
  else if(!f.entryConfirmed){gaps.push("Entry confirmation steps not checked");}
  else bE=w("entry");

  if(f.tp&&cond&&f.condType!=="cmc_side"){
    const ok=(f.tp==="618"&&cond.isTMC)||(f.tp==="272"&&!cond.isTMC);
    if(ok)bT=w("tp");
    else{bT=0;ac.push({sev:"med",cat:"tp",msg:`TP ${f.tp==="618"?"6.18":"2.72"} doesn't match ${cond.l}. TP earns 0/${w("tp").toFixed(2)}.`});kc.push("TP Selection");}
  }

  bS=isNY?w("session"):0;
  if(!isNY){wm.push("Outside NY session — session score is 0. You can analyse but not log trades.");kc.push("Session Timing");}

  const net=(bA,bB,sev,msg)=>{
    const n=bA-bB;
    ac.push({sev,cat:"cross",msg:`${msg} Net: ${bA.toFixed(2)}−${bB.toFixed(2)}=${n.toFixed(2)}`});
    if(n>0)return{a:n,b:0,d:0};
    ded+=Math.abs(n);return{a:0,b:0,d:Math.abs(n)};
  };

  // LQ vs Range conflict — skipped for recognized pullbacks (LQ aligning with
  // the external trend while ranges show the internal pullback is expected)
  if(!isPullback&&f.lqDir&&f.rangeDir&&f.lqDir!==f.rangeDir&&bL>0&&bR>0){
    const r=net(bL,bR,"high",`LQ direction ${f.lqDir.toUpperCase()} vs Ranges ${f.rangeDir.toUpperCase()}`);
    bL=r.a;bR=r.b;if(!kc.includes("Liquidity"))kc.push("Liquidity");
  }
  // Note: the TMC-Above-50% vs deep-fib (618/786) contradiction check has been
  // removed (Problem 2) — at deep fibs, trend confirmation via MAs is unreliable
  // anyway, so a TMC condition reacting to 618/786 is no longer treated as a
  // cross-category conflict. The CMC + fast-fib check remains, since a CMC
  // pullback reacting at 23.6% is genuinely unusual and worth flagging.
  if(cond&&fib&&f.fibConfirmed&&bC>0&&bRh>0){
    if((f.condType==="cmc_bull"||f.condType==="cmc_bear")&&fib.fast){
      bC=Math.max(0,bC-0.2*redist);bRh=Math.max(0,bRh*0.5);
      ac.push({sev:"med",cat:"cond_fib",msg:`CMC + ${fib.l} unusual — both partially reduced.`});
    }
  }

  const raw=Math.max(0,bR+bM+bC+bRh+bL+bE+bT+bS-ded);
  const final=Math.min(raw,MAX_TOTAL);
  const pct=Math.round((final/MAX_TOTAL)*100);
  const hc=ac.filter(c=>c.sev==="high").length;
  const sw=gaps.some(g=>g.includes("SIDEWAYS"));

  let validity="INVALID",vc="#ff4d6a";
  if(!sw&&hc===0&&pct>=70){validity="VALID";vc="#00d97e";}
  else if(!sw&&hc<=1&&pct>=40){validity="LOW CONFIDENCE";vc="#f97316";}

  let probLabel="VERY LOW",probCol="#ff4d6a";
  if(pct>=90){probLabel="VERY HIGH";probCol="#00d97e";}
  else if(pct>=75){probLabel="HIGH";probCol="#4ade80";}
  else if(pct>=60){probLabel="MODERATE";probCol="#fbbf24";}
  else if(pct>=40){probLabel="LOW";probCol="#f97316";}

  const buckets=[
    {label:"Ranges",earned:bR,max:w("ranges"),col:"#a78bfa"},
    {label:"MAs",earned:bM,max:maExcluded?0:W.ma,col:"#60a5fa"},
    {label:"Cond",earned:bC,max:w("cond"),col:"#60a5fa"},
    {label:"Rhythm",earned:bRh,max:w("rhythm"),col:"#f5c842"},
    {label:"LQ",earned:bL,max:w("lq"),col:"#00d97e"},
    {label:"Entry",earned:bE,max:w("entry"),col:"#f97316"},
    {label:"TP",earned:bT,max:w("tp"),col:"#a78bfa"},
    {label:"Session",earned:bS,max:w("session"),col:"#00d97e"},
  ];

  return{earned:final,rawScore:raw,pct,gaps,conflicts:ac,keyConflicts:kc,warns:wm,sideways:sw,ready:validity==="VALID"&&gaps.length===0,probLabel,probCol,validity,validityCol:vc,buckets,highConflicts:hc,maxTotal:MAX_TOTAL,maExcluded,isPullback};
}

function buildNarrative(f,score){
  const parts=[];
  const action=f.lqDir==="bullish"||f.rangeDir==="bullish"?"buying":"selling";
  if(f.rangeDir&&f.rangeType){
    let hier="";
    if(f.externalDir&&f.internalDir){
      if(f.externalDir===f.internalDir)hier=` External and internal ranges both ${f.rangeDir}.`;
      else hier=` Internal ${f.internalDir} pullback within the external ${f.externalDir} trend — pullback-in-trend setup.`;
    }
    parts.push(`Structure shows ≥2 confirmed ${f.rangeDir} ${f.rangeType} ranges.${hier}`);
    const maSet=[f.ma50,f.ma100,f.ma200].filter(v=>v&&v!=="").length;
    if(maSet>0&&!score.maExcluded){
      const maA=[f.ma50,f.ma100,f.ma200].filter(v=>v==="aligned").length;
      if(maA===3)parts.push("All 3 MAs aligned — price in the right zone.");
      else if(maA===2)parts.push("2/3 MAs aligned — partial MA support.");
      else if(maA===1)parts.push("1/3 MAs aligned — weak MA support.");
      else parts.push("MAs conflicting — price fighting all MAs.");
    } else if(score.maExcluded){
      parts.push("Deep fib level — MAs excluded from analysis. Focus on price action and wick structure.");
    }
  }
  const cond=CONDS.find(o=>o.v===f.condType);
  if(cond&&f.condType!=="cmc_side"){
    const sp=f.condType==="tmc_above50"?"running with the trend, above 50%":f.condType==="tmc_below50"?"crawling — below 50%, trending but slow":"in counter-trend pullback";
    parts.push(`${cond.l} — price is ${sp}.`);
  }
  const fib=FIBS.find(o=>o.v===f.fibLevel);
  if(fib&&f.fibConfirmed)parts.push(`Rhythm confirmed at ${fib.l} — expecting 3rd reaction. ${fib.n}.`);
  if(f.lqTypes.length&&f.lqDir)parts.push(`Liquidity: ${f.lqTypes.slice(0,2).join(" and ")} — ${action} away from LQ, not chasing.`);
  const entry=ENTRIES.find(o=>o.v===f.entryModel);
  if(entry&&f.entryConfirmed)parts.push(`Entry: ${entry.l} — all confirmation steps checked.`);
  if(f.tp&&f.risk)parts.push(`Risk $${f.risk}. TP at ${f.tp==="618"?"6.18 (TMC)":"2.72 (CMC)"}. Set and forget.`);
  if(score.ready)parts.push(`Story makes sense. I'm ${action} with ${score.probLabel.toLowerCase()} probability.`);
  else if(score.conflicts.length>0)parts.push("Opposing confluences detected — probability reduced. Resolve or stand aside.");
  else if(score.gaps.length>0)parts.push("Story incomplete — fill missing pieces before executing.");
  return parts.join(" ");
}

function calcStats(journal,todayKey,weekKey,maxLoss,maxTrades){
  // Pending trades have no outcome yet — exclude them from win-rate, streaks,
  // grade performance, and pattern insights. Daily trade COUNT still includes
  // pending (a trade was taken), but daily LOSS total only reflects closed losses.
  const closed=journal.filter(e=>e.outcome!=="pending");
  const pending=journal.filter(e=>e.outcome==="pending");
  const today=journal.filter(e=>e.todayKey===todayKey);
  const todayClosed=closed.filter(e=>e.todayKey===todayKey);
  const weekly=closed.filter(e=>e.weekKey===weekKey);
  const todayLoss=todayClosed.filter(e=>e.outcome==="loss").reduce((a,e)=>a+(parseFloat(e.risk)||50),0);
  const todayTrades=today.length;
  const wr=arr=>{const t=arr.filter(e=>e.outcome!=="breakeven").length;return t?Math.round(arr.filter(e=>e.outcome==="win").length/t*100):0;};
  let streak=0,streakType=null;
  for(const e of closed){
    if(e.outcome==="breakeven")continue;
    if(!streakType){streakType=e.outcome;streak=1;}
    else if(e.outcome===streakType)streak++;
    else break;
  }
  const best=key=>{
    const map={};
    closed.forEach(e=>{
      const vals=key==="lq"?(e.lqTypes||[]):[e[key]];
      vals.filter(Boolean).forEach(v=>{if(!map[v])map[v]={w:0,t:0};map[v].t++;if(e.outcome==="win")map[v].w++;});
    });
    return Object.entries(map).filter(([,d])=>d.t>=2).sort((a,b)=>(b[1].w/b[1].t)-(a[1].w/a[1].t))[0]||null;
  };
  const grades={};
  closed.forEach(e=>{if(!e.grade)return;if(!grades[e.grade])grades[e.grade]={w:0,t:0};grades[e.grade].t++;if(e.outcome==="win")grades[e.grade].w++;});
  const condStats={};
  closed.forEach(e=>{if(!e.condition)return;if(!condStats[e.condition])condStats[e.condition]={t:0,w:0};condStats[e.condition].t++;if(e.outcome==="win")condStats[e.condition].w++;});
  const pFollowed=closed.filter(e=>e.followedProcess===true);
  const pNot=closed.filter(e=>e.followedProcess===false);
  const insights=[];
  if(closed.length>=10){
    const pWR=wr(pFollowed),npWR=wr(pNot);
    if(Math.abs(pWR-npWR)>15)insights.push(pWR>npWR?`Process WR ${pWR}% vs off-process ${npWR}% — trust the system.`:`Process WR (${pWR}%) close to off-process (${npWR}%) — review your process.`);
    const bc=best("condition"),bl=best("lq"),bs=best("session"),be=best("entryModel");
    if(bc){const w=Math.round(bc[1].w/bc[1].t*100);if(w>60)insights.push(`Best condition: ${CONDS.find(o=>o.v===bc[0])?.l||bc[0]} at ${w}% WR — lean into this.`);}
    if(bl){const w=Math.round(bl[1].w/bl[1].t*100);if(w>60)insights.push(`Best LQ type: ${bl[0]} at ${w}% WR.`);}
    if(bs){const w=Math.round(bs[1].w/bs[1].t*100);if(w>60)insights.push(`Best session: ${bs[0]} at ${w}% WR.`);}
    if(be){const w=Math.round(be[1].w/be[1].t*100);const l=ENTRIES.find(o=>o.v===be[0])?.l||be[0];if(w>60)insights.push(`Best entry: ${l} at ${w}% WR.`);}
    const low=closed.filter(e=>(e.score||0)<50);if(low.length>=5&&wr(low)<40)insights.push(`Only ${wr(low)}% WR on sub-50% confidence trades. Stop trading low-conviction setups.`);
    const inv=closed.filter(e=>e.validity==="INVALID");if(inv.length>=3)insights.push(`${inv.length} INVALID setups taken. WR: ${wr(inv)}%. Do not trade flagged setups.`);
  }
  return{allWR:wr(closed),weekWR:wr(weekly),total:closed.length,weekTotal:weekly.length,todayLoss,todayTrades,locked:todayLoss>=maxLoss||todayTrades>=maxTrades,lockReason:todayLoss>=maxLoss?"Daily loss limit reached":`Max ${maxTrades} trades reached`,streak,streakType,bestCond:best("condition"),bestLQ:best("lq"),bestSession:best("session"),bestEntry:best("entryModel"),grades,weekly,condStats,wins:closed.filter(e=>e.outcome==="win").length,losses:closed.filter(e=>e.outcome==="loss").length,bes:closed.filter(e=>e.outcome==="breakeven").length,pendingCount:pending.length,processFollowed:pFollowed.length,processWR:wr(pFollowed),noProcessWR:wr(pNot),insights};
}
